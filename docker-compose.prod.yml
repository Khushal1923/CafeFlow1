version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: cafeflow-prod-db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=SecureDbPassword123 # Replace with a strong password in production
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - cafeflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cafeflow-prod-backend
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://root:SecureDbPassword123@mongodb:27017/cafeflow?authSource=admin
      - JWT_SECRET=supersecretcafeflowjwttokenkey12345! # Replace with a secure random key
      - FRONTEND_URL=http://localhost # Replace with your production domain name
    depends_on:
      - mongodb
    volumes:
      - uploads-data:/app/public/uploads
      - bills-data:/app/public/bills
    restart: unless-stopped
    networks:
      - cafeflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cafeflow-prod-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost # Replace with your production domain name
      - NEXT_PUBLIC_SOCKET_URL=http://localhost # Replace with your production domain name
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cafeflow-network

  nginx:
    image: nginx:alpine
    container_name: cafeflow-prod-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads-data:/app/public/uploads:ro
      - bills-data:/app/public/bills:ro
      # Uncomment lines below when mounting Let's Encrypt certificates on your VPS
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - cafeflow-network

volumes:
  mongo-data:
  uploads-data:
  bills-data:

networks:
  cafeflow-network:
    driver: bridge
